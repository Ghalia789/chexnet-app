apiVersion: v1
kind: Namespace
metadata:
  name: chexnet-test
  labels:
    app: chexnet
    env: test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chexnet-app
  namespace: chexnet-test
  labels:
    app: chexnet
    env: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chexnet
  template:
    metadata:
      labels:
        app: chexnet
        env: test
    spec:
      containers:
        - name: chexnet-app
          image: us-central1-docker.pkg.dev/chexnet-app/chexnet/chexnet-app:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 7860
          env:
            - name: ENVIRONMENT
              value: test
          resources:
            requests:
              cpu: "300m"
              memory: "1024Mi"
            limits:
              cpu: "700m"
              memory: "1536Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: chexnet-service
  namespace: chexnet-test
  labels:
    app: chexnet
    env: test
spec:
  type: ClusterIP
  selector:
    app: chexnet
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 7860
